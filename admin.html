<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration – CCB Saint Abraham</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        /* ── LOGIN ── */
        .login-container {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            padding: 2.5rem;
            border-radius: 32px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.12);
            text-align: center;
        }
        .login-container input[type="password"] {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border: 1.5px solid #e8dccc;
            border-radius: 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            background: #fefcf8;
            margin-bottom: 1rem;
        }
        .login-container input[type="password"]:focus {
            outline: none; border-color: #b8860b;
            box-shadow: 0 0 0 3px rgba(184,134,11,0.1);
        }

        /* ── ADMIN LAYOUT ── */
        .admin-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 100%);
            color: white;
            padding: 1.75rem 2rem;
            border-radius: 24px;
            margin-bottom: 1.75rem;
            text-align: center;
        }
        .admin-header h1 { color: white; margin-bottom: .4rem; font-size: 1.5rem; }
        .admin-header p { color: #ccc; font-size: .9rem; }

        .logout-btn {
            position: fixed; top: 1rem; right: 1rem;
            background: #e53e3e; color: white;
            border: none; padding: .5rem 1.1rem;
            border-radius: 20px; cursor: pointer;
            font-size: .85rem; z-index: 200;
            font-family: 'DM Sans', sans-serif;
        }
        .logout-btn:hover { background: #c53030; }

        /* ── STATS ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem; margin-bottom: 1.75rem;
        }
        .stat-card {
            background: white; padding: 1.25rem;
            border-radius: 20px; text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stat-number { font-size: 2.2rem; font-weight: 700; color: #b8860b; }
        .stat-label { color: #6b5a4a; font-size: .8rem; margin-top: .2rem; }

        /* ── TABS ── */
        .tabs-bar {
            display: flex; gap: .5rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: .6rem 1.3rem;
            border: 1.5px solid #e8dccc;
            background: white; border-radius: 40px;
            cursor: pointer; font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            font-size: .85rem; transition: .15s;
        }
        .tab-btn.active { background: #b8860b; border-color: #b8860b; color: white; }
        .tab-btn.tab-announce.active { background: #2563eb; border-color: #2563eb; color: white; }

        /* ── PANEL WRAPPER ── */
        .panel { display: none; }
        .panel.active { display: block; }

        /* ── MESSAGE LIST ── */
        .message-list {
            background: white; border-radius: 24px; padding: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .message-item {
            border-bottom: 1px solid #f5ede0;
            padding: 1.25rem 1rem;
            transition: .15s;
        }
        .message-item:last-child { border-bottom: none; }
        .message-item.pending { background: #fffef7; border-left: 4px solid #f59e0b; }
        .message-item.approved { border-left: 4px solid #10b981; }

        .message-header {
            display: flex; justify-content: space-between;
            align-items: flex-start; flex-wrap: wrap;
            gap: .5rem; margin-bottom: .6rem;
        }
        .badges { display: flex; gap: .4rem; flex-wrap: wrap; align-items: center; }
        .badge {
            display: inline-block; padding: .2rem .7rem;
            border-radius: 20px; font-size: .7rem; font-weight: 600;
        }
        .badge-pending   { background: #fef3c7; color: #d97706; }
        .badge-approved  { background: #d1fae5; color: #065f46; }
        .badge-temoignage{ background: #dbeafe; color: #1e40af; }
        .badge-intention { background: #fce7f3; color: #9d174d; }

        .message-meta { font-size: .75rem; color: #8b7a6a; }
        .message-content {
            font-size: .95rem; line-height: 1.6;
            margin: .6rem 0; color: #2c241a;
            background: #fefcf8; padding: .75rem 1rem;
            border-radius: 12px;
        }
        .action-buttons { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .5rem; }
        .btn-approve { background: #10b981; color: white; border: none; padding: .45rem .95rem; border-radius: 20px; cursor: pointer; font-size: .8rem; font-family: 'DM Sans', sans-serif; }
        .btn-approve:hover { background: #059669; }
        .btn-edit    { background: #3b82f6; color: white; border: none; padding: .45rem .95rem; border-radius: 20px; cursor: pointer; font-size: .8rem; font-family: 'DM Sans', sans-serif; }
        .btn-edit:hover { background: #2563eb; }
        .btn-delete  { background: #ef4444; color: white; border: none; padding: .45rem .95rem; border-radius: 20px; cursor: pointer; font-size: .8rem; font-family: 'DM Sans', sans-serif; }
        .btn-delete:hover { background: #dc2626; }

        .admin-actions {
            display: flex; gap: .75rem;
            justify-content: flex-end; margin-bottom: 1rem; flex-wrap: wrap;
        }
        .export-btn {
            background: #3b82f6; color: white;
            border: none; padding: .5rem 1.1rem;
            border-radius: 20px; cursor: pointer;
            font-size: .82rem; font-family: 'DM Sans', sans-serif;
        }
        .btn-danger {
            background: #f97316; color: white;
            border: none; padding: .5rem 1.1rem;
            border-radius: 20px; cursor: pointer;
            font-size: .82rem; font-family: 'DM Sans', sans-serif;
        }
        .empty-state { text-align: center; padding: 2.5rem; color: #8b7a6a; }

        /* ── ANNONCES PANEL ── */
        .announce-panel { background: white; border-radius: 24px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .announce-form-card {
            background: #eff6ff;
            border: 1.5px dashed #93c5fd;
            border-radius: 20px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
        }
        .announce-form-card h3 { font-size: 1rem; color: #1e40af; margin-bottom: 1rem; }
        .ann-input, .ann-textarea {
            width: 100%; padding: .75rem 1rem;
            border: 1.5px solid #e8dccc; border-radius: 14px;
            font-family: 'DM Sans', sans-serif; font-size: .95rem;
            background: white; margin-bottom: .75rem;
        }
        .ann-input:focus, .ann-textarea:focus {
            outline: none; border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,.1);
        }
        .ann-textarea { min-height: 90px; resize: vertical; }
        .btn-add-ann {
            background: #2563eb; color: white;
            border: none; padding: .65rem 1.5rem;
            border-radius: 20px; cursor: pointer;
            font-size: .9rem; font-weight: 600;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-add-ann:hover { background: #1d4ed8; }

        .announce-item-admin {
            display: flex; align-items: flex-start;
            gap: 1rem; padding: 1rem 0;
            border-bottom: 1px solid #f5ede0;
        }
        .announce-item-admin:last-child { border-bottom: none; }
        .ann-body { flex: 1; }
        .ann-date-label {
            font-size: .75rem; font-weight: 600; color: #b8860b; margin-bottom: .2rem;
        }
        .ann-text-display { font-size: .92rem; color: #2c241a; line-height: 1.5; }
        .ann-actions { display: flex; gap: .4rem; flex-shrink: 0; align-items: center; }
        .toggle-btn {
            border: none; padding: .4rem .9rem; border-radius: 20px;
            cursor: pointer; font-size: .78rem;
            font-family: 'DM Sans', sans-serif;
        }
        .toggle-btn.active-ann { background: #d1fae5; color: #065f46; }
        .toggle-btn.inactive-ann { background: #fee2e2; color: #991b1b; }

        /* ── MODAL ── */
        .modal {
            display: none; position: fixed;
            inset: 0; background: rgba(0,0,0,0.45);
            justify-content: center; align-items: center; z-index: 500;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: white; padding: 2rem;
            border-radius: 24px; max-width: 500px;
            width: 90%; box-shadow: 0 16px 48px rgba(0,0,0,0.2);
        }
        .modal-content h3 { margin-bottom: 1rem; }
        .modal-content textarea {
            width: 100%; padding: .85rem;
            border: 1.5px solid #e8dccc; border-radius: 16px;
            font-family: 'DM Sans', sans-serif; font-size: .95rem;
            margin: .5rem 0 1rem; min-height: 120px; resize: vertical;
        }
        .modal-content textarea:focus { outline: none; border-color: #b8860b; }
        .modal-btns { display: flex; gap: .75rem; }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <!-- LOGIN -->
    <div id="loginPanel" class="login-container">
        <div class="cross-icon">✝</div>
        <h2 style="color:#3b2a1f;margin-bottom:.3rem;">Administration</h2>
        <p style="color:#6b5a4a;margin-bottom:1.5rem;font-size:.9rem;">CCB Saint Abraham</p>
        <input type="password" id="adminPassword" placeholder="Mot de passe administrateur"
               onkeydown="if(event.key==='Enter') checkPassword()">
        <button onclick="checkPassword()" class="btn-submit" style="margin-top:.25rem;">Se connecter</button>
        <p style="margin-top:1rem;font-size:.75rem;color:#aaa;">
            Mot de passe par défaut : <strong>saintabraham2026</strong>
        </p>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" style="display:none;">
        <button onclick="logout()" class="logout-btn">🚪 Déconnexion</button>

        <div class="container">
            <div class="admin-header">
                <div class="cross-icon">✝</div>
                <h1>Panneau d'administration</h1>
                <p>CCB Saint Abraham – Gérez les messages et les annonces</p>
            </div>

            <!-- Stats -->
            <div class="stats-grid" id="statsContainer"></div>

            <!-- Tabs -->
            <div class="tabs-bar">
                <button class="tab-btn active" data-tab="pending">⏳ En attente <span id="pendingCount">(0)</span></button>
                <button class="tab-btn" data-tab="approved">✅ Publiés <span id="approvedCount">(0)</span></button>
                <button class="tab-btn" data-tab="all">📋 Tous <span id="allCount">(0)</span></button>
                <button class="tab-btn tab-announce" data-tab="annonces">📢 Annonces</button>
            </div>

            <!-- Panel : Messages -->
            <div id="panel-pending" class="panel active">
                <div class="admin-actions">
                    <button onclick="exportData()" class="export-btn">📥 Exporter JSON</button>
                    <button onclick="clearAll()" class="btn-danger">⚠️ Tout supprimer</button>
                </div>
                <div class="message-list" id="list-pending"></div>
            </div>
            <div id="panel-approved" class="panel">
                <div class="message-list" id="list-approved"></div>
            </div>
            <div id="panel-all" class="panel">
                <div class="message-list" id="list-all"></div>
            </div>

            <!-- Panel : Annonces -->
            <div id="panel-annonces" class="panel">
                <div class="announce-panel">
                    <!-- Formulaire ajout annonce -->
                    <div class="announce-form-card">
                        <h3>➕ Publier une nouvelle annonce</h3>
                        <input type="text" id="newAnnDate" class="ann-input" placeholder="Date ou libellé (ex : Dimanche 25 mai, Cette semaine…)">
                        <textarea id="newAnnText" class="ann-textarea" placeholder="Texte de l'annonce…"></textarea>
                        <button onclick="addAnnouncement()" class="btn-add-ann">📢 Publier l'annonce</button>
                        <div id="annSuccess" style="display:none;margin-top:.75rem;color:#065f46;background:#d1fae5;padding:.6rem 1rem;border-radius:12px;font-size:.85rem;">
                            ✅ Annonce publiée avec succès !
                        </div>
                    </div>

                    <!-- Liste des annonces existantes -->
                    <h3 style="margin-bottom:1rem;font-size:1rem;color:#3b2a1f;">📋 Annonces actuelles</h3>
                    <div id="announceList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal édition -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>✏️ Modifier le message</h3>
            <label style="font-size:.85rem;color:#6b5a4a;">Contenu :</label>
            <textarea id="editContent" rows="5"></textarea>
            <div class="modal-btns">
                <button onclick="saveEdit()" class="btn-approve">Enregistrer</button>
                <button onclick="closeModal()" class="btn-delete">Annuler</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'ccb_messages';
        const ANNOUNCEMENTS_KEY = 'ccb_announcements';
        const ADMIN_PASSWORD = 'saintabraham2026';

        let currentMessageId = null;
        let currentTab = 'pending';

        // ── AUTH ──
        function checkPassword() {
            if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadAll();
            } else {
                alert('Mot de passe incorrect');
            }
        }
        function logout() {
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        }

        // ── MESSAGES ──
        function getAllMessages() {
            const s = localStorage.getItem(STORAGE_KEY);
            return s ? JSON.parse(s) : [];
        }
        function saveAllMessages(messages) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
            loadAll();
        }

        function approveMessage(id) {
            const msgs = getAllMessages();
            const i = msgs.findIndex(m => m.id === id);
            if (i !== -1) { msgs[i].status = 'approved'; saveAllMessages(msgs); }
        }
        function deleteMessage(id) {
            if (!confirm('Supprimer définitivement ce message ?')) return;
            saveAllMessages(getAllMessages().filter(m => m.id !== id));
        }
        function editMessage(id) {
            const msg = getAllMessages().find(m => m.id === id);
            if (msg) {
                currentMessageId = id;
                document.getElementById('editContent').value = msg.content;
                document.getElementById('editModal').classList.add('open');
            }
        }
        function saveEdit() {
            if (!currentMessageId) return;
            const msgs = getAllMessages();
            const i = msgs.findIndex(m => m.id === currentMessageId);
            if (i !== -1) { msgs[i].content = document.getElementById('editContent').value; saveAllMessages(msgs); }
            closeModal();
        }
        function closeModal() {
            document.getElementById('editModal').classList.remove('open');
            currentMessageId = null;
        }

        function exportData() {
            const data = JSON.stringify(getAllMessages(), null, 2);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data], { type: 'application/json' }));
            a.download = `ccb_messages_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }
        function clearAll() {
            if (!confirm('⚠️ Supprimer TOUS les messages ?')) return;
            if (!confirm('Dernière confirmation : action irréversible !')) return;
            saveAllMessages([]);
        }

        function renderMessages(filter) {
            let msgs = getAllMessages();
            if (filter === 'pending')  msgs = msgs.filter(m => m.status === 'pending');
            if (filter === 'approved') msgs = msgs.filter(m => m.status === 'approved');
            msgs.sort((a, b) => new Date(b.date) - new Date(a.date));

            const container = document.getElementById(`list-${filter}`);
            if (!container) return;
            if (msgs.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 Aucun message dans cette catégorie.</div>';
                return;
            }

            container.innerHTML = msgs.map(msg => {
                const isPending  = msg.status === 'pending';
                const typeLabel  = msg.type === 'temoignage' ? '🌹 Témoignage' : '🕯️ Intention';
                const typeClass  = msg.type === 'temoignage' ? 'badge-temoignage' : 'badge-intention';
                const statLabel  = isPending ? 'En attente' : 'Publié';
                const statClass  = isPending ? 'badge-pending' : 'badge-approved';
                const name       = msg.anonymous ? 'Anonyme' : msg.author;
                const dateStr    = new Date(msg.date).toLocaleString('fr-FR');
                return `
                <div class="message-item ${msg.status}">
                    <div class="message-header">
                        <div class="badges">
                            <span class="badge ${typeClass}">${typeLabel}</span>
                            <span class="badge ${statClass}">${statLabel}</span>
                        </div>
                        <span class="message-meta">${name} • ${dateStr}</span>
                    </div>
                    <div class="message-content">« ${msg.content} »</div>
                    <div class="action-buttons">
                        ${isPending ? `<button class="btn-approve" onclick="approveMessage(${msg.id})">✅ Approuver</button>` : ''}
                        <button class="btn-edit"   onclick="editMessage(${msg.id})">✏️ Modifier</button>
                        <button class="btn-delete" onclick="deleteMessage(${msg.id})">🗑️ Supprimer</button>
                    </div>
                </div>`;
            }).join('');
        }

        function updateStats() {
            const msgs = getAllMessages();
            const pending  = msgs.filter(m => m.status === 'pending').length;
            const approved = msgs.filter(m => m.status === 'approved').length;
            document.getElementById('pendingCount').textContent  = `(${pending})`;
            document.getElementById('approvedCount').textContent = `(${approved})`;
            document.getElementById('allCount').textContent      = `(${msgs.length})`;
            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card"><div class="stat-number">${pending}</div><div class="stat-label">En attente</div></div>
                <div class="stat-card"><div class="stat-number">${approved}</div><div class="stat-label">Publiés</div></div>
                <div class="stat-card"><div class="stat-number">${msgs.length}</div><div class="stat-label">Total messages</div></div>
                <div class="stat-card"><div class="stat-number">${getAnnouncements().filter(a=>a.active).length}</div><div class="stat-label">Annonces actives</div></div>`;
        }

        // ── ANNONCES ──
        function getAnnouncements() {
            const s = localStorage.getItem(ANNOUNCEMENTS_KEY);
            if (s) return JSON.parse(s);
            return [
                { id: 1, date: "Cette semaine", text: "Chapelet tous les soirs à 17h30 à la chapelle.", active: true },
                { id: 2, date: "Samedi 06/06",  text: "Mariage de Joël & Nadège – Toute la CCB est invitée !", active: true },
                { id: 3, date: "Dimanche prochain", text: "Quête pour les œuvres caritatives. Merci pour votre générosité.", active: true },
                { id: 4, date: "En juin", text: "Pèlerinage paroissial – Inscriptions au secrétariat.", active: true }
            ];
        }
        function saveAnnouncements(list) {
            localStorage.setItem(ANNOUNCEMENTS_KEY, JSON.stringify(list));
            renderAnnouncements();
            updateStats();
        }

        function addAnnouncement() {
            const date = document.getElementById('newAnnDate').value.trim();
            const text = document.getElementById('newAnnText').value.trim();
            if (!date || !text) { alert('Veuillez remplir la date et le texte.'); return; }

            const list = getAnnouncements();
            list.push({ id: Date.now(), date, text, active: true });
            saveAnnouncements(list);

            document.getElementById('newAnnDate').value = '';
            document.getElementById('newAnnText').value = '';
            const ok = document.getElementById('annSuccess');
            ok.style.display = 'block';
            setTimeout(() => ok.style.display = 'none', 2500);
        }

        function toggleAnnouncement(id) {
            const list = getAnnouncements();
            const i = list.findIndex(a => a.id === id);
            if (i !== -1) { list[i].active = !list[i].active; saveAnnouncements(list); }
        }

        function deleteAnnouncement(id) {
            if (!confirm('Supprimer cette annonce ?')) return;
            saveAnnouncements(getAnnouncements().filter(a => a.id !== id));
        }

        function renderAnnouncements() {
            const list = getAnnouncements();
            const container = document.getElementById('announceList');
            if (list.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#8b7a6a;padding:1.5rem;">Aucune annonce pour le moment.</p>';
                return;
            }
            container.innerHTML = list.map(ann => `
                <div class="announce-item-admin">
                    <div class="ann-body">
                        <div class="ann-date-label">📅 ${ann.date}</div>
                        <div class="ann-text-display">${ann.text}</div>
                    </div>
                    <div class="ann-actions">
                        <button class="toggle-btn ${ann.active ? 'active-ann' : 'inactive-ann'}"
                            onclick="toggleAnnouncement(${ann.id})">
                            ${ann.active ? '✅ Active' : '🚫 Masquée'}
                        </button>
                        <button class="btn-delete" style="padding:.4rem .8rem;font-size:.75rem;"
                            onclick="deleteAnnouncement(${ann.id})">🗑️</button>
                    </div>
                </div>`).join('');
        }

        // ── TABS ──
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                document.getElementById(`panel-${currentTab}`).classList.add('active');
                if (currentTab !== 'annonces') renderMessages(currentTab);
            });
        });

        // Fermer modal en dehors
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ── INIT ──
        function loadAll() {
            updateStats();
            renderMessages('pending');
            renderMessages('approved');
            renderMessages('all');
            renderAnnouncements();
        }
    </script>
</body>
</html>
